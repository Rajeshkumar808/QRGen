<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>QR Tool</title>

<!-- Generator Library -->
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<!-- Scanner Library -->
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f0f0f0;
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 420px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
}

input {
  width: 90%;
  padding: 10px;
  margin-bottom: 10px;
}

button {
  padding: 10px 20px;
  font-size: 15px;
  background: #2980b9;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  margin: 5px;
}

button:hover {
  background: #1f6391;
}

#reader {
  margin-top: 20px;
}

#result {
  font-weight: bold;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h1>QR Code Tool</h1>

  <!-- QR Generator -->
  <input type="text" id="text" placeholder="Enter text or URL">

  <button onclick="generateQRCode()">Generate QR</button>
  <button id="downloadBtn" style="display:none;">Download QR</button>
  <button id="refreshBtn">Refresh</button>

  <div id="qrcode"></div>

  <hr>

  <!-- QR Scanner -->
  <button onclick="startScanner()">Start Scanner</button>

  <div id="reader"></div>
  <p id="result">Scan a QR code...</p>
</div>

<script>
/* ---------- QR GENERATOR ---------- */

function generateQRCode() {
  const qrText = document.getElementById("text").value.trim();
  const qrContainer = document.getElementById("qrcode");
  const downloadBtn = document.getElementById("downloadBtn");

  if (!qrText) {
    alert("Please enter text or URL.");
    return;
  }

  qrContainer.innerHTML = "";

  QRCode.toCanvas(qrText, { width: 200 }, function (err, canvas) {
    if (err) return console.error(err);

    qrContainer.appendChild(canvas);

    downloadBtn.style.display = "inline-block";
    downloadBtn.onclick = () => {
      const link = document.createElement("a");
      link.download = "qrcode.png";
      link.href = canvas.toDataURL();
      link.click();
    };
  });
}

document.getElementById("refreshBtn").onclick = () => {
  document.getElementById("text").value = "";
  document.getElementById("qrcode").innerHTML = "";
  document.getElementById("downloadBtn").style.display = "none";
};


/* ---------- QR SCANNER ---------- */

let html5QrCode;

function startScanner() {

  html5QrCode = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(devices => {
    if (devices.length) {

      html5QrCode.start(
        devices[0].id,
        { fps: 10, qrbox: 250 },
        onScanSuccess
      );

    }
  });
}

function onScanSuccess(decodedText) {

  const result = document.getElementById("result");

  if (/^(http|https):\/\//.test(decodedText)) {
    result.innerHTML = `Result: <a href="${decodedText}" target="_blank">${decodedText}</a>`;
  } else {
    result.innerText = "Result: " + decodedText;
  }

  html5QrCode.stop();
}
</script>

</body>
</html>
